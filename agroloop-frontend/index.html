{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Qu'est-ce que l'économie circulaire agricole ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "L'économie circulaire agricole consiste à valoriser les résidus et sous-produits agricoles comme les cabosses de cacao, coques d'anacarde et tiges de plantain au lieu de les brûler ou les abandonner."
      }
    },
    {
      "@type": "Question",
      "name": "Comment fonctionne AgroLoopCI ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "AgroLoopCI connecte les producteurs agricoles aux transformateurs via une marketplace géolocalisée. Les producteurs publient leurs résidus disponibles et les transformateurs les achètent directement."
      }
    },
    {
      "@type": "Question",
      "name": "Quels types de résidus agricoles sont disponibles ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Cabosses de cacao, coques d'anacarde, tiges de plantain, balles de riz et bien d'autres résidus agro-industriels en Côte d'Ivoire."
      }
    },
    {
      "@type": "Question",
      "name": "AgroLoopCI est-il gratuit ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "L'inscription est gratuite. AgroLoopCI prend une petite commission uniquement sur les transactions réalisées."
      }
    },
    {
      "@type": "Question",
      "name": "Dans quelles régions opère AgroLoopCI ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "AgroLoopCI opère dans toutes les régions de Côte d'Ivoire : Abidjan, San Pedro, Abengourou, Bouaké, Korhogo, Daloa, Man et Yamoussoukro."
      }
    }
  ]
}
