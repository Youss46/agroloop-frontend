kind = "web"
previewPath = "/"
title = "AgroLoopCI"
version = "1.0.0"
id = "artifacts/agroloop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23103

[services.development]
run = "pnpm --filter @workspace/agroloop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agroloop", "run", "build" ]
publicDir = "artifacts/agroloop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23103"
BASE_PATH = "/"
